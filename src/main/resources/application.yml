spring:
  application:
    name: asset-radar
  kafka:
    bootstrap-servers: localhost:9092
    admin:
      auto-create: true
      fail-fast: false
    consumer:
      group-id: asset-radar
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  data:
    redis:
      host: localhost
      port: 6380
  r2dbc:
    url: r2dbc:postgresql://localhost:5433/asset_radar
    username: asset_radar
    password: asset_radar

asset-radar:
  coin:
    enabled: true
    websocket-url: wss://api.upbit.com/websocket/v1
    symbols:
      - KRW-BTC
      - KRW-ETH
  stock-kr:
    enabled: true
    base-url: https://openapi.koreainvestment.com:9443
    app-key: ${ASSET_RADAR_KIS_APP_KEY:}
    app-secret: ${ASSET_RADAR_KIS_APP_SECRET:}
    refresh-interval: 3s
    symbols:
      - "005930"
      - "000660"
    source: KIS
  stock-us:
    enabled: true
    base-url: https://www.alphavantage.co
    api-key: ${ASSET_RADAR_ALPHAVANTAGE_API_KEY:}
    refresh-interval: 1m
    symbols:
      - AAPL
      - NVDA
    source: ALPHAVANTAGE
  gold:
    enabled: true
    base-url: https://api.gold-api.com
    symbol: XAU
    refresh-interval: 5m
    source: GOLDAPI
  pipeline:
    kafka-topic: asset.price.realtime
    analysis-kafka-topic: asset.price.analysis
    redis-key-prefix: asset:latest
    analysis-redis-key-prefix: analysis:latest
    alert-redis-key-prefix: alert:latest
    redis-ttl: 6h
  dashboard:
    default-stale-threshold: 10m
    stale-thresholds:
      UPBIT: 30s
      BINANCE: 30s
      GOLDAPI: 15m
      KIS: 1m
      KOREAINVESTMENT: 1m
      ALPHAVANTAGE: 20m
      FINNHUB: 20m
  alert:
    window: 1m
    info-change-rate-threshold: 0.005
    warn-change-rate-threshold: 0.01
    critical-change-rate-threshold: 0.02
    notifier:
      async:
        core-pool-size: 2
        max-pool-size: 4
        queue-capacity: 200
      slack:
        enabled: false
        minimum-severity: CRITICAL
        webhook-url: ${ASSET_RADAR_ALERT_SLACK_WEBHOOK_URL:}
        timeout: 3s
      webhook:
        enabled: false
        minimum-severity: WARN
        url: ${ASSET_RADAR_ALERT_WEBHOOK_URL:}
        auth-token: ${ASSET_RADAR_ALERT_WEBHOOK_AUTH_TOKEN:}
        timeout: 3s

springdoc:
  info:
    title: Asset Radar API
    description: 실시간 자산 가격 수집·분석·알림 플랫폼
    version: ${project.version:0.1.0-SNAPSHOT}
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: asset-radar
    distribution:
      percentiles-histogram:
        http.server.requests: true
        asset.collector.fetch: true
